# Несекретные runtime env-переменные Cloud Run (читаемая замена ^@@^-флага).
# Секреты — отдельно через --set-secrets в deploy.yaml. Прочая конфигурация
# (INFOBIP_*, PUBLIC_BASE_URL, CLOUD_TASKS_*) берётся из дефолтов settings.py.
# DEBUG не задаём — дефолт settings.py уже False.
ALLOWED_HOSTS: "javi.serbito.rs,.run.app"
CSRF_TRUSTED_ORIGINS: "https://javi.serbito.rs"
STATICFILES_BACKEND: "whitenoise.storage.CompressedManifestStaticFilesStorage"
TASK_SCHEDULER: "tasks.scheduler.CloudTasksScheduler"
SECURE_SSL: "True"
# Бесплатные квоты (виджет в кабинете). Maps — реальный free tier Google (10000 вызовов/мес).
# Viber — остаток Infobip-триала НА 2026-06-07: 93 из 100 бесплатных (триал ~57 дней);
# счётчик считает наши отправки от 0, упрёмся в реальную сотню после ещё 93. SMS=0 → пока
# показываем только расход, без «осталось» (точное бесплатное число по SMS не задано).
FREE_QUOTA_MAPS: "10000"
FREE_QUOTA_VIBER: "93"
FREE_QUOTA_SMS: "0"
