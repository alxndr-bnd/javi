name: Deploy to Cloud Run

# Tag-based deploys: push a v*.*.* tag (via scripts/release_minor.sh) to ship.
# Keyless auth via Workload Identity Federation — no service-account JSON key.
# Mirrors the planning-poker pipeline (same GCP project `serbito`).
#
# Stage 0: builds & deploys the static landing (Dockerfile = nginx).
# Stage 1: swap the Dockerfile for the Django image — this workflow is unchanged.
on:
  # Deploy ONLY on a v*.*.* tag (via scripts/release_minor.sh). No
  # workflow_dispatch — that would let unreleased code bypass the tag gate.
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write # required for WIF / OIDC

env:
  PROJECT_ID: serbito
  REGION: europe-west1
  SERVICE: javi
  AR_IMAGE: europe-west1-docker.pkg.dev/serbito/javi/javi
  WIF_PROVIDER: projects/488744139718/locations/global/workloadIdentityPools/github-pool/providers/github
  DEPLOYER_SA: javi-deployer@serbito.iam.gserviceaccount.com

jobs:
  verify: # Sanity-check the landing before shipping
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7 (SHA-pinned: supply-chain, Aikido)
      - name: Landing exists and is non-empty
        run: |
          test -s landing/index.html
          echo "landing/index.html OK ($(wc -c < landing/index.html) bytes)"
      - name: HTML well-formed (basic)
        run: |
          python3 - <<'PY'
          import html.parser, sys
          class P(html.parser.HTMLParser):
              pass
          P().feed(open('landing/index.html', encoding='utf-8').read())
          print('HTML parse OK')
          PY

  deploy:
    runs-on: ubuntu-latest
    needs: verify # Block deploy if the landing check fails
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7 (SHA-pinned: supply-chain, Aikido)

      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3 (SHA-pinned)
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3 (SHA-pinned)

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4 (SHA-pinned)

      - name: Build & push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7 (SHA-pinned)
        with:
          context: .
          push: true
          tags: ${{ env.AR_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.AR_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.AR_IMAGE }}:buildcache,mode=max

      # --- Security: scan the built image for OS/dep CVEs + leaked secrets (parity with
      # serbito). Hard gate: a *fixed* HIGH/CRITICAL fails the deploy. Pinned install
      # (tagged install.sh + binary version, not mutable main) for supply-chain safety. ---
      - name: Trivy image scan
        run: |
          # install.sh pinned to the immutable commit of tag v0.71.2 (not the mutable tag) — supply-chain integrity (Aikido).
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/055a5c8a53bfd61f7a8e276a5b2f0c3fc1673420/contrib/install.sh | sh -s -- -b /usr/local/bin v0.71.2
          trivy image --scanners vuln,secret --severity HIGH,CRITICAL \
            --ignore-unfixed --exit-code 1 --format table --timeout 10m \
            "${{ env.AR_IMAGE }}:${{ github.sha }}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$AR_IMAGE:${{ github.sha }}" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=1 \
            --concurrency=250 \
            --port=8080 \
            --timeout=60 \
            --add-cloudsql-instances="serbito:europe-west1:serbitodb" \
            --env-vars-file=.github/deploy.env.yaml \
            --set-secrets="SECRET_KEY=javi-secret-key:latest,DATABASE_URL=javi-database-url:latest,GOOGLE_MAPS_API_KEY=javi-google-maps-key:latest,INFOBIP_API_KEY=javi-infobip-key:latest,INFOBIP_WEBHOOK_SECRET=javi-infobip-webhook-secret:latest,TASKS_SECRET=javi-tasks-secret:latest"
        # One-time domain mapping (javi.serbito.rs -> service) — see SETUP_CICD.md.
        # Требуются Secret Manager секреты javi-secret-key, javi-database-url,
        # javi-google-maps-key, javi-infobip-key, javi-infobip-webhook-secret, javi-tasks-secret
        # и роли runtime-SA: roles/cloudsql.client, roles/secretmanager.secretAccessor (на секреты),
        # roles/cloudtasks.enqueuer (постановка задач оценки в очередь javi-rating).
        # INFOBIP_BASE_URL/SENDER/CHANNEL, PUBLIC_BASE_URL, CLOUD_TASKS_* — из дефолтов settings.py.
