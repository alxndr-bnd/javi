# Dependabot version updates. Security updates (for known CVEs) are enabled
# separately in the repo's Security settings; this file schedules routine bumps.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Python deps managed by uv (pyproject.toml + uv.lock).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"

  # The Cloud Run image base (python:3.12-slim).
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

  # Pinned GitHub Actions in .github/workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
